<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FTL - 3D Space Simulator</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: monospace;
      }
      canvas {
        display: block;
      }
      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #0f0;
        pointer-events: none;
        user-select: none;
        text-shadow: 1px 1px 2px #000;
        background: rgba(0, 0, 0, 0.5);
        padding: 15px;
        border: 1px solid #0f0;
        border-radius: 5px;
        font-size: 16px;
        line-height: 1.5;
      }
      #controlsHelp {
        position: absolute;
        right: 20px;
        bottom: 20px;
        color: #0f0;
        pointer-events: none;
        user-select: none;
        text-shadow: 1px 1px 2px #000;
        background: rgba(0, 0, 0, 0.45);
        padding: 12px 14px;
        border: 1px solid rgba(0, 255, 0, 0.75);
        border-radius: 5px;
        font-size: 14px;
        line-height: 1.45;
        transition: opacity 180ms ease;
      }
      #controlsHelp.locked {
        opacity: 0.28;
      }
      #labelsOverlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        user-select: none;
      }
      #atmosphereOverlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: #62b7ff;
        mix-blend-mode: screen;
        opacity: 0;
        transition: opacity 120ms linear, background 180ms linear;
      }
      .spaceLabel {
        position: absolute;
        color: #b8ffb8;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(0, 255, 0, 0.55);
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 13px;
        line-height: 1;
        text-shadow: 1px 1px 2px #000;
        transform: translate(-50%, -140%);
        white-space: nowrap;
        text-align: center;
      }
      .spaceLabelName {
        color: #d8ffd8;
      }
      .spaceLabelDistance {
        margin-top: 3px;
        color: #7dff7d;
        font-size: 11px;
      }
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #crosshair::before, #crosshair::after {
        content: '';
        position: absolute;
        background-color: rgba(0, 255, 0, 0.5);
      }
      #crosshair::before {
        top: 9px; left: 0; width: 20px; height: 2px;
      }
      #crosshair::after {
        top: 0; left: 9px; width: 2px; height: 20px;
      }
    </style>
  </head>
  <body>
    <div id="crosshair"></div>
    <div id="atmosphereOverlay"></div>
    <div id="labelsOverlay"></div>
    <div id="controlsHelp">
      <div>Click: mouse look</div>
      <div>W/S: thrust/brake</div>
      <div>A/D: strafe</div>
      <div>Q/E: roll</div>
      <div>Wheel: speed trim</div>
    </div>
      <div id="hud">
        <div>Speed: <span id="speedDisplay">0</span> km/s (<span id="speedCDisplay">0</span>x c)</div>
        <div>Mode: <span id="travelModeDisplay">Sublight</span></div>
        <div>Altitude: <span id="altitudeDisplay">0 km</span> (<span id="altitudeTargetDisplay">Earth</span>)</div>
      </div>
    <canvas id="simCanvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
